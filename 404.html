<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <meta name="robots" content="noindex" />
    <title>Página no encontrada — Álvaro Pastor</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400..800&family=IBM+Plex+Mono:ital,wght@0,400;0,500;1,400&family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="./styles/portfolio.css" />
    <style>
        .error-page {
            display: grid;
            min-height: 100svh;
            grid-template-rows: auto 1fr auto;
        }

        .error-main {
            display: grid;
            place-items: center;
            padding: 4rem 0;
        }

        .error-card {
            width: min(100%, 48rem);
            border-top: 1px solid var(--tinta);
            border-bottom: 1px solid var(--tinta);
            padding: clamp(2.5rem, 7vw, 6rem) 0;
        }

        .error-code {
            margin: 0 0 1.5rem;
            color: var(--tinta-50);
            font: 500 0.78rem/1.3 "IBM Plex Mono", monospace;
            letter-spacing: 0.12em;
            text-transform: uppercase;
        }

        .error-title {
            max-width: 10ch;
            margin: 0;
            font: 700 clamp(3.5rem, 10vw, 7.5rem)/0.91 "Bricolage Grotesque", sans-serif;
            letter-spacing: -0.065em;
        }

        .error-text {
            max-width: 36rem;
            margin: 1.75rem 0 2.25rem;
            color: var(--tinta-70);
            font-size: clamp(1rem, 2vw, 1.18rem);
            line-height: 1.6;
        }

        .error-footer {
            padding: 1.25rem 0 1.75rem;
            color: var(--tinta-50);
            font: 400 0.75rem/1.4 "IBM Plex Mono", monospace;
        }

        @media (max-width: 640px) {
            .error-main {
                align-items: start;
                padding-top: 7rem;
            }

            .error-card {
                padding: 2.75rem 0;
            }
        }
    </style>
</head>

<body class="error-page">
    <nav class="nav" aria-label="Navegación principal">
        <div class="contenedor nav-fila">
            <a class="nav-marca" href="./index.html">Álvaro Pastor<span class="nav-apellido"> Periago</span></a>
            <a class="btn btn-secundario" href="./index.html">Volver al inicio</a>
        </div>
    </nav>

    <main class="error-main">
        <section class="contenedor error-card" aria-labelledby="error-title">
            <p class="error-code">Error 404</p>
            <h1 class="error-title" id="error-title">Esta página no está aquí.</h1>
            <p class="error-text">Puede que la dirección esté mal escrita o que el contenido se haya movido. El
                portfolio sigue disponible desde el inicio.</p>
            <a class="btn btn-primario" href="./index.html">Ir al portfolio</a>
        </section>
    </main>

    <footer class="contenedor error-footer">alvaropastor.dev · 404</footer>
</body>

</html>
